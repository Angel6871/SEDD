# RP-1 / 98% H2O2 feasibility study configuration
# Edit this file — no Python knowledge required.

# ================================
# Thrust requirement
# ================================
F_req_N: 750   # Required thrust [N]

# ================================
# Chamber pressure sweep [bar]
# ================================
Pc_min: 5.0
Pc_max: 20.0
Pc_points: 100
# Optional legacy mode (explicit values):
# Pc_bar_list: [5.0, 7.5, 10.0, 12.5, 15.0]

# ================================
# Mixture ratio sweep (O/F)
# ================================
OF_min: 3
OF_max: 10
OF_points: 100

# ================================
# Nozzle design mode
# ================================
# mode: "ae_at"  -> you provide a list of expansion ratios (geometry-driven)
# mode: "pip"    -> you provide exit pressure (Pe_bar) and CEA computes ae/at (sea-level design)
nozzle_mode: pip

# If nozzle_mode == "pip":
# Design exit pressure [bar]. Sea level is ~1.01325 bar.
Pe_bar: 1.01325

# If nozzle_mode == "ae_at":
# ae_at_list: [4, 6, 8, 10, 12]

# ================================
# Oxidizer purity (mass fractions)
# ================================
H2O2_mass_frac: 0.98
H2O_mass_frac: 0.02
decomp_conversion: 0.98
eta_decomp: 0.90
delta_p_bed_bar: 2.0

# ================================
# Inlet temperatures [K]
# ================================
fuel_T_K: 298.15
ox_T_K: 298.15

# ================================
# CEA analysis type
# Base options:
#   "equilibrium"
#   "frozen"
#
# Frozen-location controls (optional):
#   nfz: 1          -> freeze composition at chamber
#   nfz: 2          -> freeze composition at throat
#   custom_nfz: x   -> custom freeze location (CEA_Wrap custom option)
#
# Examples:
#   analysis_type: equilibrium
#   analysis_type: frozen
#   analysis_type: frozen
# ================================
analysis_type: frozen
nfz: 2
#custom_nfz: 0.0

# ================================
# Real engine efficiencies (1.0 = ideal)
# ================================
eta_cstar: 0.97
eta_cf: 0.94

# ================================
# Best-point temperature limit
# ================================
# Maximum allowed chamber temperature [K] when selecting best_by_mdot rows.
# Set to null to disable this constraint.
Tc_max_K: 2500

# ================================
# Output control
# ================================
output_csv: results.csv
output_dir: outputs
run_trajectory: true
# Plot titles toggle (true/false)
plot_show_titles: false
# Optional custom run folder name inside output_dir.
# Leave empty or remove to auto-use: run_YYYYMMDD_HHMMSS
run_name: frozen_throat_750
